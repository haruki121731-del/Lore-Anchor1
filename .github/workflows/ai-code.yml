name: 🤖 Hybrid LLM Auto-Coder

# Triggered by issues labeled 'ai-code'
# Routes to: Ollama (simple) | Claude (complex) via covibe-router
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub Issue number to process'
        required: true
        type: number
      force_strategy:
        description: 'Force LLM strategy'
        type: choice
        options: [auto, fast, strong]
        default: auto

permissions:
  contents: read
  issues: write

jobs:
  route-and-code:
    name: Classify & Auto-Code
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'ai-code' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      # ── Get issue details ──────────────────────────────────────────────────
      - name: Get issue details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNum = context.payload.issue?.number ||
                             parseInt('${{ github.event.inputs.issue_number }}');
            const { data } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum,
            });
            core.setOutput('title', data.title);
            core.setOutput('body', data.body || '');
            core.setOutput('labels', data.labels.map(l => l.name).join(','));
            core.setOutput('number', issueNum);

      # ── Classify complexity ────────────────────────────────────────────────
      - name: Classify task complexity
        id: classify
        run: |
          TITLE="${{ steps.issue.outputs.title }}"
          BODY="${{ steps.issue.outputs.body }}"
          LABELS="${{ steps.issue.outputs.labels }}"

          # Simple keyword scoring (bash-based, no API needed)
          COMPLEX_SCORE=0
          SIMPLE_SCORE=0

          COMPLEX_KWS="architecture security vulnerability auth jwt oauth migration schema cryptography c2pa signature distributed concurrency stripe rls redesign"
          SIMPLE_KWS="test typo rename format lint docstring comment readme import boilerplate scaffold css style translation"

          for kw in $COMPLEX_KWS; do
            if echo "${TITLE,,} ${BODY,,}" | grep -q "$kw"; then
              COMPLEX_SCORE=$((COMPLEX_SCORE + 1))
            fi
          done

          for kw in $SIMPLE_KWS; do
            if echo "${TITLE,,} ${BODY,,}" | grep -q "$kw"; then
              SIMPLE_SCORE=$((SIMPLE_SCORE + 1))
            fi
          done

          # Label overrides
          if echo "$LABELS" | grep -qE "architecture|security|complex"; then
            COMPLEXITY="complex"; STRATEGY="strong"
          elif echo "$LABELS" | grep -qE "quick-fix|typo|docs|simple"; then
            COMPLEXITY="simple"; STRATEGY="fast"
          elif [ $COMPLEX_SCORE -ge 2 ]; then
            COMPLEXITY="complex"; STRATEGY="strong"
          elif [ $SIMPLE_SCORE -ge 2 ]; then
            COMPLEXITY="simple"; STRATEGY="fast"
          else
            COMPLEXITY="medium"; STRATEGY="auto"
          fi

          # workflow_dispatch override
          FORCED="${{ github.event.inputs.force_strategy }}"
          if [ -n "$FORCED" ] && [ "$FORCED" != "auto" ]; then
            STRATEGY="$FORCED"
            [ "$FORCED" = "fast" ] && COMPLEXITY="simple"
            [ "$FORCED" = "strong" ] && COMPLEXITY="complex"
          fi

          echo "complexity=$COMPLEXITY" >> $GITHUB_OUTPUT
          echo "strategy=$STRATEGY" >> $GITHUB_OUTPUT
          echo "Classified as: $COMPLEXITY (strategy=$STRATEGY)"

      # ── Comment with routing decision ─────────────────────────────────────
      - name: Post routing decision comment
        uses: actions/github-script@v7
        with:
          script: |
            const complexity = '${{ steps.classify.outputs.complexity }}';
            const strategy = '${{ steps.classify.outputs.strategy }}';
            const models = { simple: '🦙 Local LLM (Ollama qwen2.5-coder)',
                             medium: '⚡ Free API (OpenRouter)',
                             complex: '🧠 Claude Sonnet (API)' };
            const emojis = { simple: '🟢', medium: '🟡', complex: '🔴' };
            
            const hasOpenRouter = '${{ secrets.OPENROUTER_API_KEY }}' ? true : false;
            const hasAnthropic = '${{ secrets.ANTHROPIC_API_KEY }}' ? true : false;
            
            let modelNote = models[complexity];
            if (complexity !== 'simple' && !hasOpenRouter && !hasAnthropic) {
              modelNote = '🦙 Local LLM (fallback - no API keys)';
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.number }},
              body: `## 🤖 LLM Router Decision

| Field | Value |
|---|---|
| Complexity | ${emojis[complexity]} ${complexity} |
| Strategy | \`${strategy}\` |
| Model | ${modelNote} |

_Available APIs: OpenRouter=${hasOpenRouter}, Anthropic=${hasAnthropic}_

_Starting code generation..._`
            });

      # ── Python + dependencies setup ─────────────────────────────────────────
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: pip }

      - name: Install dependencies
        run: pip install openai>=1.0.0

      # ── Generate with OpenRouter (Free/Cheap models) ───────────────────────
      - name: Generate code (OpenRouter)
        if: steps.classify.outputs.complexity != 'simple'
        id: generate_openrouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          python3 - << 'PYEOF'
          import os
          import sys
          from openai import OpenAI

          title = os.environ["ISSUE_TITLE"]
          body = os.environ["ISSUE_BODY"]
          api_key = os.environ.get("OPENROUTER_API_KEY")
          
          if not api_key:
              print("OPENROUTER_API_KEY not set, falling back to local model")
              sys.exit(1)

          # 無料モデルを優先
          free_models = [
              "stepfun/step-3.5-flash:free",
              "mistralai/mistral-small-3.1-24b-instruct:free",
              "openai/gpt-oss-20b:free",
          ]
          
          client = OpenAI(
              base_url="https://openrouter.ai/api/v1",
              api_key=api_key,
          )
          
          result = None
          used_model = None
          
          for model in free_models:
              try:
                  print(f"Trying {model}...")
                  completion = client.chat.completions.create(
                      model=model,
                      messages=[
                          {"role": "system", "content": "You are an expert engineer. Provide minimal, clean code with exact file paths."},
                          {"role": "user", "content": f"Implement this:\n\nTitle: {title}\n\nDetails:\n{body}\n\nProvide complete implementation with file paths."}
                      ],
                      timeout=120
                  )
                  result = completion.choices[0].message.content
                  used_model = model
                  print(f"Success with {model}")
                  break
              except Exception as e:
                  print(f"Failed with {model}: {e}")
                  continue
          
          if not result:
              sys.exit(1)
              
          with open("/tmp/code_result.md", "w") as f:
              f.write(result)
          print(f"Generated {len(result)} chars using {used_model}")
          PYEOF
        continue-on-error: true

      # ── Generate code (Ollama — local free) ────────────────────────────────
      - name: Generate code (Ollama — local free)
        if: steps.classify.outputs.complexity == 'simple' || steps.generate_openrouter.outcome == 'failure'
        env:
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          # Install Ollama in CI (cached)
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve &>/dev/null &
          sleep 5

          # Pull tiny model for CI (fast)
          ollama pull qwen2.5-coder:1.5b || ollama pull tinyllama

          python3 - << 'PYEOF'
          import os
          import json
          import urllib.request

          title = os.environ["ISSUE_TITLE"]
          body = os.environ["ISSUE_BODY"]

          prompt = f"""You are an expert engineer. Implement this task:

Title: {title}
Details: {body}

Provide exact file paths and minimal code changes."""

          models = ["qwen2.5-coder:1.5b", "tinyllama", "phi3:mini"]
          result = None
          
          for model in models:
              try:
                  print(f"Trying local model: {model}")
                  data = json.dumps({
                      "model": model,
                      "prompt": prompt,
                      "stream": False,
                      "options": {"temperature": 0.1}
                  }).encode()

                  req = urllib.request.Request(
                      "http://localhost:11434/api/generate",
                      data=data,
                      headers={"Content-Type": "application/json"}
                  )
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      result = json.loads(resp.read())["response"]
                  print(f"Success with {model}")
                  break
              except Exception as e:
                  print(f"Failed with {model}: {e}")
                  continue
          
          if not result:
              result = "Code generation failed. Please implement manually."

          with open("/tmp/code_result.md", "w") as f:
              f.write(result)
          print(f"[LOCAL] Generated {len(result)} chars — $0.00 cost!")
          PYEOF

      # ── Post result as PR-ready comment ───────────────────────────────────
      - name: Post code result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result = '';
            try { result = fs.readFileSync('/tmp/code_result.md', 'utf8'); }
            catch { result = 'Code generation completed but output not captured.'; }

            const complexity = '${{ steps.classify.outputs.complexity }}';
            const isLocal = '${{ steps.generate_openrouter.outcome }}' === 'failure' || complexity === 'simple';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.number }},
              body: `## ${isLocal ? '🦙 Local LLM' : '🤖 AI'} Generated Code

${isLocal ? '> 💚 **$0.00 cost** — ran on local Ollama\n\n' : ''}
${result.slice(0, 60000)}

---
_To apply: copy the code above into your editor_`
            });

            // Label the issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.number }},
              labels: [isLocal ? 'ai-coded-local' : 'ai-coded']
            });
